
<ion-buttons slot="start">
  <br>
  <ion-back-button  defaultHref="listopp"></ion-back-button>
</ion-buttons>


<ion-content> 
  <form [formGroup]="onLoginForm" class="list-form">

  
    <div align="center">
      <img shape="round"  style="width: 30%;border-radius: 100% ; height: 30%;"  src="assets/img/oppav.jfif"/><br><br>
    <ion-label>New Opportunity</ion-label>
    </div>
    
<br>

   <ion-card>  
    <ion-item>

      <ion-label style="font-size:large" ><ion-icon style="margin-right: 7px;" name="People"></ion-icon>Prospect<ion-text color="danger">*</ion-text></ion-label>

      <ionic-selectable
      placeholder="choose prospect" formControlName="prospect" required
        item-content 
        [(ngModel)]="port"
        [items]="ports"
        itemValueField="id"
        itemTextField="fullname"
        [canSearch]="true"
        headerColor="primary"
        (onChange)="portChange($event)">

        <ng-template ionicSelectableCloseButtonTemplate>
  
          <ion-icon name="close"></ion-icon>

        </ng-template>

        <ng-template ionicSelectableTitleTemplate>
  
choose a prospect
        </ng-template>
      </ionic-selectable>
   
</ion-item>
   </ion-card>

 
   
   <ion-card>  
    <ion-item >
      <ion-label style="font-size:large" position="floating"><ion-icon style="margin-right: 7px;" name="create"></ion-icon>Nom de l'affaire<ion-text color="danger">*</ion-text></ion-label>
      <ion-input placeholder="Nom d'affaire"  formControlName="nomaffaire" required  [(ngModel)]="opportunityadd.nomaffaire" required type="text"></ion-input>
    </ion-item>
   </ion-card>


 


     
  <ion-card>   <ion-item>
    <ion-label style="font-size:large" ><ion-icon style="margin-right: 7px;" name="analytics"></ion-icon>Etape<ion-text color="danger">*</ion-text></ion-label>

    <ion-select formControlName="etape" required  [(ngModel)]="opportunityadd.etape" >
      <ion-select-option value="prospect identifié">prospect identifié</ion-select-option>
      <ion-select-option value="contact effectué">contact effectué</ion-select-option>
      <ion-select-option value="suivi planifié">suivi planifié</ion-select-option>
      <ion-select-option value="rendez-vous pris">rendez-vous pris</ion-select-option>
      <ion-select-option value="negociation en cours">negociation en cours</ion-select-option>
    
    </ion-select>
  </ion-item></ion-card>
     

  <ion-card> 
     <ion-item>
      <ion-label style="font-size:large" ><ion-icon style="margin-right: 7px;" name="Briefcase"></ion-icon>Source</ion-label>

    <ion-select  formControlName="source"   [(ngModel)]="opportunityadd.source">
      <ion-select-option value="magazine">magazine </ion-select-option>
      <ion-select-option value="fb"> fb</ion-select-option>
      <ion-select-option value="youtube">youtube</ion-select-option>
      <ion-select-option value="event">event</ion-select-option>      
    </ion-select>
  </ion-item></ion-card>



  <ion-card>
    <ion-item>
      <ion-label style="font-size:large"><ion-icon style="margin-right: 7px;" name="calendar"></ion-icon>Date d'echeance</ion-label>

       <ion-datetime  formControlName="dateech"   [(ngModel)]="opportunityadd.dateecheance" display-format="MMM DD, YYYY" picker-format="YYYY-MM-DD" placeholder="Select Date"></ion-datetime>
    </ion-item>
  </ion-card>


  <ion-card>  
     <ion-item> 
      <ion-label style="font-size:large" position="floating"><ion-icon style="margin-right: 7px;" name="create"></ion-icon>Probabilité</ion-label>
    <ion-input  formControlName="proba"  placeholder="probabilté"  [(ngModel)]="opportunityadd.proba" type="text" ></ion-input>
  </ion-item>
</ion-card>




<ion-card>
  <ion-item>
      
    <ion-label style="font-size:large" position="floating"><ion-icon style="margin-right: 7px;" name="Business"></ion-icon>Societé</ion-label>
    <ion-input  formControlName="societe" placeholder="societé"   [(ngModel)]="opportunityadd.societe" type="text" ></ion-input>
  </ion-item>
</ion-card>


  <ion-card> <ion-item>
    <ion-label style="font-size:large" ><ion-icon style="margin-right: 7px;" name="logo-usd"></ion-icon>Currency<ion-text color="danger"></ion-text></ion-label>

    <ion-select formControlName="devise"   [(ngModel)]="opportunityadd.devise">
      <ion-select-option value="dollar" >dollar</ion-select-option>
      <ion-select-option value="euro" >euro</ion-select-option>

    </ion-select>
  </ion-item></ion-card>

  <ion-card> <ion-item>
      
    <ion-label style="font-size:large" position="floating"><ion-icon style="margin-right: 7px;" name="logo-usd"></ion-icon>Montant</ion-label>
    <ion-input  formControlName="montant"  placeholder="montant"  [(ngModel)]="opportunityadd.montant" type="text" ></ion-input>
  </ion-item></ion-card>


  <ion-card> <ion-item>
    <ion-label style="font-size:large" position="floating"><ion-icon style="margin-right: 7px;" name="document"></ion-icon>Brief</ion-label>
    <ion-textarea formControlName="brief" Placeholder="Brief"   [(ngModel)]="opportunityadd.brief"  rows="3" cols="20" ></ion-textarea>
  </ion-item>  </ion-card>

    
       
     



<div align="center">
  <ion-button (click)="newopp()" style=" height: 55px; width:70% ;margin:20px;"   color="dark" [disabled]="!onLoginForm.valid" tappable  no-margin><ion-icon style="margin-right: 10px;;" name="add"></ion-icon>Ajouter</ion-button>
</div>


</form>  

     
</ion-content>
